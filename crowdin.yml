# Crowdin configuration file
# Docs: https://crowdin.github.io/crowdin-cli/configuration

project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN

# Preserve file/directory hierarchy in Crowdin
preserve_hierarchy: true

files:
  # Source: English (source of truth)
  - source: /src/messages/en.json
    # Translation files pattern
    # %two_letters_code% maps to: de, fr, it, es, nl
    # For custom locale codes (be, at), use language_mapping below
    translation: /src/messages/%file_name%.json

    # Map Crowdin language codes to our locale file names
    languages_mapping:
      locale:
        de: de
        fr: fr
        it: it
        es-ES: es
        nl: nl
        # Belgium (fr-BE) → be.json
        fr-BE: be
        # Austria (de-AT) → at.json
        de-AT: at
        # Taiwan (zh-TW) → tw.json
        zh-TW: tw

    # JSON settings
    type: json
    content_segmentation: 1
    translatable_elements: ["//*"]
